version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - gocritic
    - misspell
    - unconvert
    - unparam
    - prealloc
    - noctx
    - revive
    - exhaustive
    - gochecknoinits
    - nilerr
    - rowserrcheck
    - sqlclosecheck
    - wastedassign

  settings:
    errcheck:
      check-type-assertions: true
      # Blank-identifier assignments like `_, _ = f()` are intentional
      check-blank: false

    # shadow is idiomatic Go (err := in if blocks); too noisy to enable
    govet:
      enable: []

    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
      disabled-checks:
        - hugeParam
        - rangeValCopy
        - exitAfterDefer    # os.Exit in main after defer is intentional
        - unnecessaryBlock  # scoping blocks in main are stylistic
        - httpNoBody        # nil body for GET/DELETE is well-understood

    misspell:
      locale: US

    revive:
      rules:
        - name: exported
          disabled: true
        - name: var-naming
        - name: package-comments
          disabled: true
        - name: unused-parameter
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: increment-decrement
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
          disabled: true

    exhaustive:
      default-signifies-exhaustive: true

    unparam:
      check-exported: false

  exclusions:
    rules:
      # Close/Rollback/Abort return values are intentionally ignored in defer
      - linters: [errcheck]
        text: "(Close|Rollback|Abort|Stop)` is not checked"

      # net.DialTimeout in startup health-check loops; context.Background() is implied
      - linters: [noctx]
        text: "net.DialTimeout must not be called"

      # "cancelled" is the spelling used by the Google Calendar API and as a task domain status
      - linters: [misspell]
        text: "cancelled"

      # test files: relax several linters
      - path: "_test\\.go"
        linters:
          - errcheck
          - unparam
          - gocritic
          - gochecknoinits
          - noctx

    # Exclude auto-generated Swagger docs and stub files from all linters
    paths:
      - ".*/docs/docs\\.go"
      - "docs_routes\\.go"

issues:
  max-issues-per-linter: 50
  max-same-issues: 10

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - omni-backend

run:
  timeout: 5m
  tests: true
