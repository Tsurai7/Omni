version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - gocritic
    - misspell
    - unconvert
    - unparam
    - prealloc
    - noctx
    - revive
    - exhaustive
    - gochecknoinits
    - nilerr
    - rowserrcheck
    - sqlclosecheck
    - wastedassign

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  govet:
    enable:
      - shadow

  gocritic:
    enabled-tags:
      - diagnostic
      - performance
      - style
    disabled-checks:
      - hugeParam
      - rangeValCopy

  misspell:
    locale: US

  revive:
    rules:
      - name: exported
        disabled: true
      - name: var-naming
      - name: package-comments
        disabled: true
      - name: unused-parameter
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: increment-decrement
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return

  exhaustive:
    default-signifies-exhaustive: true

  unparam:
    check-exported: false

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - unparam
        - gocritic
        - gochecknoinits

    - path: cmd/
      linters:
        - gochecknoinits

  max-issues-per-linter: 50
  max-same-issues: 10

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - omni-backend

run:
  timeout: 5m
  tests: true
